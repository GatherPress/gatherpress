name: Release

# Tag-driven release automation.
#
# Pushing a tag like `0.34.0` cuts a stable release: distro zip is built and
# attached to a GitHub Release, the .github/changelog/* entries get rolled up
# into CHANGELOG.md under a new version header (and auto-PR'd back to develop
# for review), and the plugin is deployed to wordpress.org.
#
# Pushing a tag like `0.34.0-alpha.1`, `-beta.1`, or `-rc.1` cuts a pre-release:
# distro zip is attached to a GitHub Pre-Release (marked NOT-latest), the
# release body is a snapshot of CHANGELOG.md's `[Unreleased]` section so
# people testing alphas can see what's queued, and the .github/changelog/*
# entries are LEFT IN PLACE so the eventual stable release still has them.
#
# Release-manager docs: docs/developer/release-process.md.

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-*'

permissions:
  contents: read

jobs:
  # Classify the tag and extract the matching changelog body so downstream
  # jobs don't have to redo it.
  prepare:
    name: Prepare release context
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.context.outputs.version }}
      is_prerelease: ${{ steps.context.outputs.is_prerelease }}
      release_body: ${{ steps.body.outputs.release_body }}
    steps:
      - name: Checkout the tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Classify tag
        id: context
        run: |
          version="${GITHUB_REF_NAME}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

          # Pre-release suffix detection: alpha.N, beta.N, rc.N (per SemVer).
          if [[ "${version}" =~ -(alpha|beta|rc)\. ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${version} is a pre-release."
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${version} is a stable release."
          fi

      - name: Extract changelog body
        id: body
        env:
          IS_PRERELEASE: ${{ steps.context.outputs.is_prerelease }}
          VERSION: ${{ steps.context.outputs.version }}
        run: |
          # Pre-release: snapshot the [Unreleased] section as-is. Stable: the
          # release body is written later by the rollup job (this output is
          # only used by pre-releases). For stable, we still emit something
          # here so the output isn't empty — the rollup job overrides it.
          if [[ "${IS_PRERELEASE}" == "true" ]]; then
            # Single-pass capture between the [Unreleased] header and the next
            # version header. Suppresses leading blanks until the first non-blank
            # line, and buffers trailing blanks so they never get flushed.
            section="$(awk '
              /^## \[Unreleased\]/ { capture = 1; next }
              /^## \[/ && capture { exit }
              capture {
                if ($0 ~ /[^[:space:]]/) {
                  seen = 1
                  if (buffered) { printf "%s", buffered; buffered = "" }
                  print
                } else if (seen) {
                  buffered = buffered $0 ORS
                }
              }
            ' CHANGELOG.md)"

            if [[ -z "$section" ]]; then
              section="_No changelog entries queued yet for this pre-release._"
            fi
          else
            section="_Will be populated by the rollup job._"
          fi

          # Multi-line output via the GH Actions heredoc protocol.
          {
            echo "release_body<<EOF_BODY"
            echo "$section"
            echo "EOF_BODY"
          } >> "$GITHUB_OUTPUT"

  # Roll up .github/changelog/* into CHANGELOG.md under a new [X.Y.Z] header,
  # push to a release/X.Y.Z branch, and open a PR back to develop for human
  # review. Stable releases only — pre-releases preserve the entries.
  rollup-changelog:
    name: Roll up CHANGELOG.md
    needs: prepare
    if: needs.prepare.outputs.is_prerelease == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_body: ${{ steps.extract.outputs.release_body }}
    steps:
      - name: Checkout the tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          tools: composer

      - name: Composer install
        env:
          COMPOSER_PROCESS_TIMEOUT: 0
          COMPOSER_NO_INTERACTION: 1
          COMPOSER_NO_AUDIT: 1
        run: composer install --optimize-autoloader --prefer-dist

      - name: Roll up changelog entries
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          # --use-version pins the section header to the tag we're releasing,
          # --release-date defaults to today, --add-pr-num appends [#NNNN] from
          # merge commit subjects, and --deduplicate=-1 disables looking back
          # at prior versions (we trust each entry file to be unique-by-author).
          vendor/bin/changelogger write \
            --use-version="${VERSION}" \
            --release-date="$(date +%Y-%m-%d)" \
            --add-pr-num \
            --deduplicate=-1 \
            --yes

      - name: Extract release body from CHANGELOG.md
        id: extract
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          # Capture lines between the new [X.Y.Z] header and the next ## header.
          # Single-pass: suppress leading blanks until first non-blank, buffer
          # trailing blanks so they never flush.
          section="$(awk -v ver="${VERSION}" '
            $0 ~ "^## \\[" ver "\\]" { capture = 1; next }
            /^## \[/ && capture { exit }
            capture {
              if ($0 ~ /[^[:space:]]/) {
                seen = 1
                if (buffered) { printf "%s", buffered; buffered = "" }
                print
              } else if (seen) {
                buffered = buffered $0 ORS
              }
            }
          ' CHANGELOG.md)"

          if [[ -z "$section" ]]; then
            echo "::error::Rolled-up CHANGELOG.md does not contain a [${VERSION}] section. Did the changelogger write command succeed?"
            exit 1
          fi

          {
            echo "release_body<<EOF_BODY"
            echo "$section"
            echo "EOF_BODY"
          } >> "$GITHUB_OUTPUT"

      - name: Open PR with rolled-up changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          branch="release/${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Create the branch off the tag, add the rollup commit, and push.
          git checkout -b "${branch}"
          git add CHANGELOG.md .github/changelog/
          git commit -m "Roll up changelog for ${VERSION}"
          git push origin "${branch}"

          # Open a PR back to develop. The release manager merges once the
          # release has shipped and they've sanity-checked the rendered body.
          gh pr create \
            --base develop \
            --head "${branch}" \
            --title "Roll up changelog for ${VERSION}" \
            --body "Automated rollup of \`.github/changelog/*\` entries into \`CHANGELOG.md\` as part of the ${VERSION} release. Merge after confirming the rendered release body at https://github.com/${GITHUB_REPOSITORY}/releases/tag/${VERSION} looks right." \
            --label "Skip Changelog"

  # Build the distro zip via wp-scripts plugin-zip (already in package.json).
  # Same artifact for both pre-release and stable paths.
  build:
    name: Build distro zip
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout the tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install JS deps
        run: npm ci

      - name: Build distro zip
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          # wp-scripts plugin-zip writes ./gatherpress.zip with a top-level
          # gatherpress/ directory inside (set by package.json "name"). Rename
          # the outer file to `gatherpress.<version>.zip` so users downloading
          # from the GitHub release see which build they got, while the
          # internal layout stays exactly what WP expects (unzips as gatherpress/).
          npm run plugin-zip
          mv gatherpress.zip "gatherpress.${VERSION}.zip"

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: distro-zip
          path: gatherpress.${{ needs.prepare.outputs.version }}.zip
          if-no-files-found: error
          retention-days: 7

  # Create the GitHub Release (or Pre-Release) with the zip attached and the
  # appropriate changelog body. The body source differs by path:
  #   - Pre-release: [Unreleased] snapshot from prepare.outputs.release_body
  #   - Stable: rolled-up [X.Y.Z] section from rollup-changelog.outputs.release_body
  release:
    name: Create GitHub release
    needs: [prepare, build, rollup-changelog]
    # rollup-changelog is skipped on pre-releases; without `always()` this job
    # would skip too. Re-gate so we only run when build succeeded AND either
    # rollup succeeded (stable) or was skipped (pre-release).
    if: |
      always()
      && needs.build.result == 'success'
      && (needs.rollup-changelog.result == 'success' || needs.rollup-changelog.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download zip artifact
        uses: actions/download-artifact@v4
        with:
          name: distro-zip

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          name: ${{ needs.prepare.outputs.version }}
          body: |
            ${{ needs.rollup-changelog.outputs.release_body || needs.prepare.outputs.release_body }}
          files: gatherpress.${{ needs.prepare.outputs.version }}.zip
          prerelease: ${{ needs.prepare.outputs.is_prerelease == 'true' }}
          make_latest: ${{ needs.prepare.outputs.is_prerelease == 'false' && 'true' || 'false' }}
          fail_on_unmatched_files: true

  # Stable releases only: deploy to wordpress.org via SVN. Pre-releases never
  # ship to wp.org by design — they exist for the team to test against.
  deploy-wporg:
    name: Deploy to WordPress.org
    needs: [prepare, release]
    if: needs.prepare.outputs.is_prerelease == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout the tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Build production assets
        run: |
          npm ci
          npm run build

      - name: WordPress.org Plugin Deploy
        uses: 10up/action-wordpress-plugin-deploy@stable
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
