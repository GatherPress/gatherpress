name: Release

# Tag-driven release automation.
#
# Pushing a tag like `0.34.0` cuts a stable release: distro zip is built and
# attached to a GitHub Release, the .github/changelog/* entries get rolled up
# into CHANGELOG.md under a new version header (and auto-PR'd back to develop
# for review), and the plugin is deployed to wordpress.org.
#
# Pushing a tag like `0.34.0-alpha.1`, `-beta.1`, or `-rc.1` cuts a pre-release:
# distro zip is attached to a GitHub Pre-Release (marked NOT-latest), the
# release body is the SAME rolled-up section that would ship at stable (so
# testers see what they're testing), but the rollup is computed in an
# ephemeral checkout — no commit, no PR, no entry files deleted. Pre-releases
# never deploy to wp.org tags; beta tags additionally sync SVN *trunk* (with
# the served Stable tag preserved) so translators get the new strings early.
#
# Release-manager docs: docs/contributor/release-process.md.

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-*'

permissions:
  contents: read

jobs:
  # Classify the tag so downstream jobs know which path to take.
  prepare:
    name: Prepare release context
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      version: ${{ steps.context.outputs.version }}
      is_prerelease: ${{ steps.context.outputs.is_prerelease }}
    steps:
      - name: Classify tag
        id: context
        run: |
          version="${GITHUB_REF_NAME}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

          # Pre-release suffix detection: alpha.N, beta.N, rc.N (per SemVer).
          if [[ "${version}" =~ -(alpha|beta|rc)\. ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${version} is a pre-release."
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${version} is a stable release."
          fi

      - name: Abort if a previous rollup PR is still open
        if: steps.context.outputs.is_prerelease == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          # An unmerged release/* rollup PR means .github/changelog/ still
          # holds entries that already shipped in a previous release — rolling
          # them up again would double-list them in this release's changelog
          # (#1921). Merge (or close) the open rollup PR, fix the tag's
          # branch, and re-tag.
          open_rollups=$(gh pr list --repo "${REPO}" --state open \
            --json headRefName --jq '[.[] | select(.headRefName | startswith("release/"))] | length')

          if [[ "${open_rollups}" != "0" ]]; then
            echo "::error::An open release/* rollup PR exists — its consumed changelog entries would double-roll into this release. Merge it first, then re-tag."
            exit 1
          fi

  # Always runs: aggregate `.github/changelog/*` into a new [X.Y.Z] section
  # and capture the section text as the release body. For stable tags we
  # additionally commit the rollup back via an auto-PR; for pre-releases the
  # working-dir changes evaporate when the job ends, so the entry files stay
  # intact for the eventual stable release.
  rollup:
    name: Roll up changelog
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_body: ${{ steps.extract.outputs.release_body }}
    steps:
      - name: Checkout the tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          tools: composer

      - name: Composer install
        env:
          COMPOSER_PROCESS_TIMEOUT: 0
          COMPOSER_NO_INTERACTION: 1
          COMPOSER_NO_AUDIT: 1
        run: composer install --optimize-autoloader --prefer-dist

      - name: Roll up changelog entries
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          # --use-version pins the section header to the tag we're releasing,
          # --release-date defaults to today, --add-pr-num appends [#NNNN] from
          # merge commit subjects, and --deduplicate=-1 disables looking back
          # at prior versions (we trust each entry file to be unique-by-author).
          #
          # On pre-releases this modifies the ephemeral working dir; the
          # changes never get pushed because the commit step below is gated
          # on the stable path.
          vendor/bin/changelogger write \
            --use-version="${VERSION}" \
            --release-date="$(date +%Y-%m-%d)" \
            --add-pr-num \
            --deduplicate=-1 \
            --yes

      - name: Extract release body from CHANGELOG.md
        id: extract
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          IS_PRERELEASE: ${{ needs.prepare.outputs.is_prerelease }}
        run: |
          # Capture lines between the new [X.Y.Z] header and the next ## header.
          # Single-pass: suppress leading blanks until first non-blank, buffer
          # trailing blanks so they never flush.
          section="$(awk -v ver="${VERSION}" '
            $0 ~ "^## \\[" ver "\\]" { capture = 1; next }
            /^## \[/ && capture { exit }
            capture {
              if ($0 ~ /[^[:space:]]/) {
                seen = 1
                if (buffered) { printf "%s", buffered; buffered = "" }
                print
              } else if (seen) {
                buffered = buffered $0 ORS
              }
            }
          ' CHANGELOG.md)"

          if [[ -z "$section" ]]; then
            if [[ "${IS_PRERELEASE}" == "true" ]]; then
              section="_No changelog entries queued yet for this pre-release._"
            else
              echo "::error::Rolled-up CHANGELOG.md does not contain a [${VERSION}] section. Did the changelogger write command succeed? .github/changelog/ may have been empty at tag time."
              exit 1
            fi
          fi

          {
            echo "release_body<<EOF_BODY"
            echo "$section"
            echo "EOF_BODY"
          } >> "$GITHUB_OUTPUT"

      - name: Open PR with rolled-up changelog (stable only)
        if: needs.prepare.outputs.is_prerelease == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.prepare.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          branch="release/${VERSION}"

          # Branch off the tag via the API, then create the rollup commit
          # with createCommitOnBranch so GitHub signs it — develop requires
          # signed commits, and a signed head is what lets the PR auto-merge
          # with no admin override (#1921).
          gh api "repos/${REPO}/git/refs" \
            -f ref="refs/heads/${branch}" -f sha="${GITHUB_SHA}" > /dev/null

          # File changes from the changelogger run in this working tree:
          # CHANGELOG.md rewritten, consumed entry files deleted.
          additions=$(jq -n \
            --arg path "CHANGELOG.md" \
            --arg contents "$(base64 -w0 CHANGELOG.md)" \
            '[{path: $path, contents: $contents}]')
          deletions=$(git status --porcelain .github/changelog/ \
            | awk '$1 == "D" {print $2}' | jq -R '{path: .}' | jq -s .)

          jq -n \
            --arg query 'mutation ($input: CreateCommitOnBranchInput!) { createCommitOnBranch(input: $input) { commit { oid } } }' \
            --arg repo "${REPO}" \
            --arg branch "${branch}" \
            --arg oid "${GITHUB_SHA}" \
            --arg headline "Roll up changelog for ${VERSION}" \
            --argjson additions "${additions}" \
            --argjson deletions "${deletions}" \
            '{query: $query, variables: {input: {branch: {repositoryNameWithOwner: $repo, branchName: $branch}, expectedHeadOid: $oid, message: {headline: $headline}, fileChanges: {additions: $additions, deletions: $deletions}}}}' \
            > /tmp/rollup-commit.json

          gh api graphql --input /tmp/rollup-commit.json > /dev/null

          # Open the PR back to develop and let it merge itself once checks
          # pass (squash keeps develop linear). The release manager still
          # sanity-checks the rendered release body on the Release itself.
          pr_url=$(gh pr create \
            --base develop \
            --head "${branch}" \
            --title "Roll up changelog for ${VERSION}" \
            --body "Automated rollup of \`.github/changelog/*\` entries into \`CHANGELOG.md\` as part of the ${VERSION} release. Auto-merges once checks pass; the rendered release body lives at https://github.com/${GITHUB_REPOSITORY}/releases/tag/${VERSION}. Remember the changelog parity cherry-pick to main afterward (docs/contributor/release-process.md)." \
            --label "Skip Changelog")

          gh pr merge --auto --squash "${pr_url}"

  # Build the distro zip via wp-scripts plugin-zip (already in package.json).
  # Same artifact for both pre-release and stable paths.
  build:
    name: Build distro zip
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout the tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install JS deps
        run: npm ci

      - name: Build distro zip
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          # wp-scripts plugin-zip writes ./gatherpress.zip with a top-level
          # gatherpress/ directory inside (set by package.json "name"). Rename
          # the outer file to `gatherpress.<version>.zip` so users downloading
          # from the GitHub release see which build they got, while the
          # internal layout stays exactly what WP expects (unzips as gatherpress/).
          npm run plugin-zip
          mv gatherpress.zip "gatherpress.${VERSION}.zip"

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: distro-zip
          path: gatherpress.${{ needs.prepare.outputs.version }}.zip
          if-no-files-found: error
          retention-days: 7

  # Create the GitHub Release (or Pre-Release) with the zip attached and the
  # rolled-up changelog section as the body.
  release:
    name: Create GitHub release
    needs: [prepare, build, rollup]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download zip artifact
        uses: actions/download-artifact@v4
        with:
          name: distro-zip

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          name: ${{ needs.prepare.outputs.version }}
          body: ${{ needs.rollup.outputs.release_body }}
          files: gatherpress.${{ needs.prepare.outputs.version }}.zip
          prerelease: ${{ needs.prepare.outputs.is_prerelease == 'true' }}
          make_latest: ${{ needs.prepare.outputs.is_prerelease == 'false' && 'true' || 'false' }}
          fail_on_unmatched_files: true

  # Stable releases only: deploy to wordpress.org via SVN. Pre-releases never
  # ship to wp.org by design — they exist for the team to test against.
  deploy-wporg:
    name: Deploy to WordPress.org
    needs: [prepare, release]
    if: needs.prepare.outputs.is_prerelease == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout the tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Build production assets
        run: |
          npm ci
          npm run build

      - name: WordPress.org Plugin Deploy
        uses: 10up/action-wordpress-plugin-deploy@stable
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}

  # Beta tags only: deploy to wp.org SVN *trunk* — never tags/ — so
  # translate.wordpress.org picks up the new strings before the stable
  # release ships (#1758). Users are unaffected: wp.org serves the version
  # named by trunk's `Stable tag:` line, which this job deliberately
  # preserves from the existing trunk readme.txt (the beta's own readme.txt
  # says `Stable tag: X.Y.Z-beta.N`, which must never reach trunk).
  #
  # This is a custom SVN deploy because 10up/action-wordpress-plugin-deploy
  # has no trunk-only mode (10up/action-wordpress-plugin-deploy#103,
  # closed not-planned). The rsync mechanics mirror that action's deploy.sh
  # so trunk's layout matches what stable deploys produce. Alphas and RCs
  # are excluded on purpose: the polyglots guidance is to publish *named
  # beta releases*, not every development build.
  deploy-wporg-trunk:
    name: Deploy beta to WordPress.org trunk
    needs: [prepare, release]
    if: |
      github.repository == 'GatherPress/gatherpress' &&
      needs.prepare.outputs.is_prerelease == 'true' &&
      contains(needs.prepare.outputs.version, '-beta.')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout the tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Build production assets
        run: |
          npm ci
          npm run build

      - name: Deploy to SVN trunk
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail

          svn checkout --depth immediates \
            https://plugins.svn.wordpress.org/gatherpress "${HOME}/svn" > /dev/null
          svn update --set-depth infinity "${HOME}/svn/trunk" > /dev/null

          # The safety line: whatever wp.org currently serves keeps being
          # served. Abort rather than guess if trunk's readme.txt is missing
          # or has no Stable tag — deploying the beta's own Stable tag would
          # push the beta to every production site.
          current_stable=$(grep -m1 -E '^Stable tag:' "${HOME}/svn/trunk/readme.txt" \
            | sed -E 's/^Stable tag:[[:space:]]*//' | tr -d '[:space:]')

          if [[ -z "${current_stable}" ]] || [[ "${current_stable}" == *-* ]]; then
            echo "::error::Could not read a stable 'Stable tag' from trunk's readme.txt (got '${current_stable:-nothing}'). Aborting rather than risk serving the beta to production sites."
            exit 1
          fi
          echo "Preserving Stable tag: ${current_stable}"

          # Mirror 10up/action-wordpress-plugin-deploy's rsync into trunk.
          rsync -rc --exclude-from=.distignore ./ "${HOME}/svn/trunk/" \
            --delete --delete-excluded

          # Re-pin the Stable tag that rsync just overwrote with the beta's.
          sed -i -E "s/^Stable tag:.*/Stable tag: ${current_stable}/" "${HOME}/svn/trunk/readme.txt"

          cd "${HOME}/svn"
          svn add . --force > /dev/null
          svn status | awk '$1 == "!"  {print $2}' | xargs -r svn rm > /dev/null

          if [[ -z "$(svn status)" ]]; then
            echo "Trunk already matches ${VERSION}; nothing to commit."
            exit 0
          fi

          svn status
          svn commit -m "Sync trunk with ${VERSION} for translation (Stable tag pinned to ${current_stable})" \
            --username "${SVN_USERNAME}" --password "${SVN_PASSWORD}" --non-interactive > /dev/null
          echo "Trunk updated to ${VERSION}; wp.org still serves ${current_stable}."
