name: Version Bump

# Manually-triggered version bump: runs the release tooling
# (.github/scripts/release/generate-version.php), refreshes the lockfile,
# and opens a `version-X.Y.Z` PR against develop with the Skip Changelog
# label — replacing the old flow of running the gatherpress-develop WP-CLI
# command in a local WordPress install (#1827).
#
# Prerequisite: the target version must already have a credits entry in
# .github/scripts/release/data/credits.php (that lands via a normal PR).
#
# The GatherPress Alpha lockstep sync is NOT handled here (no sibling
# checkout in CI) — open its version PR separately, or run the script
# locally where ../gatherpress-alpha is checked out.
#
# Note: the commit is created via git CLI and is unsigned, like the release
# workflow's rollup commit — merging the PR into develop (signed commits
# required) may need an admin override until #1921 moves these commits to
# the API. Squash-merging creates a GitHub-signed commit either way.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to bump to (X.Y.Z or X.Y.Z-alpha.N / -beta.N / -rc.N)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: version-bump
  cancel-in-progress: false

jobs:
  bump:
    name: Generate version ${{ inputs.version }}
    runs-on: ubuntu-latest
    steps:
      - name: Validate version input
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta|rc)\.[0-9]+)?$ ]]; then
            echo "::error::'${VERSION}' is not a valid version (X.Y.Z or X.Y.Z-alpha.N/-beta.N/-rc.N)."
            exit 1
          fi

      - name: Checkout develop
        uses: actions/checkout@v4
        with:
          ref: develop

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Run the version generator
        env:
          VERSION: ${{ inputs.version }}
        run: php .github/scripts/release/generate-version.php --version="${VERSION}"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Refresh package-lock.json
        run: npm i --package-lock-only

      - name: Open the version PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          branch="version-${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -b "${branch}"
          git add gatherpress.php package.json package-lock.json readme.txt README.md SECURITY.md includes/data/credits.php
          git commit -m "Start ${VERSION}"
          git push origin "${branch}"

          gh pr create \
            --base develop \
            --head "${branch}" \
            --title "Start ${VERSION}" \
            --body "Prepares the ${VERSION} version bump. Generated by the Version Bump workflow via \`.github/scripts/release/generate-version.php\` plus \`npm i --package-lock-only\`.

          Companion PR needed in GatherPress/gatherpress-alpha for the lockstep version sync (not automated yet — see #1921).

          See docs/contributor/release-process.md for the full release train." \
            --label "Skip Changelog"
