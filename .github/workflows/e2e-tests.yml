name: E2E Tests
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    paths:
    - '.github/workflows/e2e-tests.yml'
    - 'package.*'
    - 'composer.*'
    - 'includes/**'
    - 'src/**'
    - 'test/e2e/**'
    - '*.php'
    - '*.js'

# Cancel an in-progress run when a newer commit is pushed to the same ref so
# stacked PR runs do not pile up (three were running simultaneously on
# 2026-05-30).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  playwright:
    name: Playwright Tests
    runs-on: ubuntu-latest
    # A healthy run finishes well under 30 minutes; without this a hung step
    # (e.g. the Playwright browser download stalling) inherits GitHub's 6-hour
    # default before it is killed.
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          coverage: xdebug

      - name: Install NodeJS
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          # Enable built-in functionality for caching and restoring dependencies, which is disabled by default.
          # The actions/setup-node uses actions/cache under the hood.
          # https://github.com/actions/setup-node#caching-global-packages-data
          cache: 'npm'

      # Restoring the short lived node_modules cache
      # to be used across all workflows running on the last commit.
      # https://github.com/actions/cache/blob/main/caching-strategies.md#creating-a-short-lived-cache
      - uses: actions/cache/restore@v4
        id: node_modules-cache
        with:
          path: |
            ./node_modules
          key: ${{ runner.os }}-node_modules-${{ github.sha }}-${{ hashFiles('package-lock.json') }}

      - name: NPM install
        if: steps.node_modules-cache.outputs.cache-hit != 'true'
        run: npm install

      # Creating a short lived node_modules cache
      - uses: actions/cache/save@v4
        if: steps.node_modules-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        with:
          path: |
            ./node_modules
          key: ${{ steps.node_modules-cache.outputs.cache-primary-key }}

      # Do NOT run `npx playwright install chromium` here. On 2026-05-30 that
      # download hung after the chromium binary reached 100% — Playwright's
      # post-download/extract phase stalled until killed, every attempt. Instead
      # run the suite against the Google Chrome that GitHub's ubuntu runners ship
      # preinstalled: playwright.config.js sets `channel: 'chrome'` when CI is
      # set, so no browser download is needed. This step just asserts Chrome is
      # present so a runner-image change that drops it fails fast and obvious.
      - name: Verify preinstalled Google Chrome
        run: |
          BIN="$(command -v google-chrome || command -v google-chrome-stable)"
          if [ -z "$BIN" ]; then
            echo "::error::Google Chrome is not preinstalled on this runner; E2E uses channel: 'chrome'."
            exit 1
          fi
          "$BIN" --version

      # Playwright records a video on the first retry of a failing test, and
      # video capture needs Playwright's bundled ffmpeg — which the skipped
      # browser install would normally provide. Without it, EVERY retry dies
      # instantly with "Executable doesn't exist at .../ffmpeg-linux", so a
      # flaky test can never recover. This downloads only ffmpeg (a few MB),
      # not the browsers, so it doesn't reopen the 2026-05-30 hang above.
      - name: Install Playwright ffmpeg for retry videos
        timeout-minutes: 5
        run: npx playwright install ffmpeg

      - name: Build plugin assets
        run: npm run build

      - name: Install dependencies
        run: |
          # Install Composer dependencies that might be needed for the plugin
          composer install --no-dev --no-interaction || echo "Composer install failed or not needed"

      - name: Install WordPress and start the server
        run: |
          npm run wp-env -- start --config .wp-env.test.json

          # Wait for WordPress admin to be accessible.
          npx wait-on http://localhost:8889/wp-admin -t 60000

          # Verify plugin is active.
          echo "Verifying GatherPress plugin is active..."
          npm run wp-env -- run --config .wp-env.test.json cli wp plugin list --status=active | grep gatherpress

          # Verify post types are registered via REST API.
          echo "Verifying GatherPress post types via REST API..."
          for i in 1 2 3 4 5; do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:8889/?rest_route=/wp/v2/types/gatherpress_event")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✓ GatherPress event post type registered (HTTP 200)"
              break
            fi
            echo "⏳ Waiting for post types... (attempt $i/5, HTTP status: $HTTP_STATUS)"
            sleep 2
          done

          # Final verification - fail if post type still not found.
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:8889/?rest_route=/wp/v2/types/gatherpress_event")
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ ERROR: GatherPress post types not accessible via REST API (HTTP $HTTP_STATUS)"
            npm run wp-env -- run --config .wp-env.test.json cli wp post-type list
            exit 1
          fi

          echo "✓ WordPress environment ready for E2E tests"

      - name: Run Playwright Tests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WP_BASE_URL: 'http://localhost:8889'
          PLAYWRIGHT_DEBUG: '1'
        run: npm run test:e2e

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Stop WordPress
        if: always()
        run: npm run wp-env -- stop --config .wp-env.test.json
