name: E2E Tests
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    paths:
    - '.github/workflows/e2e-tests.yml'
    - 'package.*'
    - 'composer.*'
    - 'includes/**'
    - 'src/**'
    - 'test/e2e/**'
    - '*.php'
    - '*.js'

# Cancel an in-progress run when a newer commit is pushed to the same ref so
# stacked PR runs do not pile up (three were running simultaneously on
# 2026-05-30).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  playwright:
    name: Playwright Tests
    runs-on: ubuntu-latest
    # A healthy run finishes well under 30 minutes; without this a hung step
    # (e.g. the Playwright browser download stalling) inherits GitHub's 6-hour
    # default before it is killed.
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          coverage: xdebug

      - name: Install NodeJS
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          # Enable built-in functionality for caching and restoring dependencies, which is disabled by default.
          # The actions/setup-node uses actions/cache under the hood.
          # https://github.com/actions/setup-node#caching-global-packages-data
          cache: 'npm'

      # Restoring the short lived node_modules cache
      # to be used across all workflows running on the last commit.
      # https://github.com/actions/cache/blob/main/caching-strategies.md#creating-a-short-lived-cache
      - uses: actions/cache/restore@v4
        id: node_modules-cache
        with:
          path: |
            ./node_modules
          key: ${{ runner.os }}-node_modules-${{ github.sha }}-${{ hashFiles('package-lock.json') }}

      - name: NPM install
        if: steps.node_modules-cache.outputs.cache-hit != 'true'
        run: npm install

      # Creating a short lived node_modules cache
      - uses: actions/cache/save@v4
        if: steps.node_modules-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        with:
          path: |
            ./node_modules
          key: ${{ steps.node_modules-cache.outputs.cache-primary-key }}

      # Resolve the exact Playwright version from the installed package so the
      # browser cache key tracks it. node_modules is restored/installed above,
      # so @playwright/test is available here.
      - name: Resolve Playwright version
        id: playwright-version
        run: echo "version=$(node -e "console.log(require('@playwright/test/package.json').version)")" >> "$GITHUB_OUTPUT"

      # Cache the downloaded browser binaries so a healthy run skips the CDN
      # download entirely. Keyed on the Playwright version: a version bump
      # invalidates the cache and triggers a fresh download.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      # System libraries (apt) are part of the runner, not the cache, so install
      # them every run. Split out from the browser download so an apt lock/stall
      # surfaces fast against its own short timeout. Only chromium is needed —
      # playwright.config.js defines a single chromium project.
      - name: Install Playwright system dependencies
        timeout-minutes: 5
        run: npx playwright install-deps chromium

      # Download only the chromium binary (was --with-deps, which also pulled
      # firefox + webkit). Wrapped in retry with a tight per-attempt timeout so
      # a stalled CDN download is killed and retried in minutes instead of
      # hanging for hours (observed 1-2h+ hangs on 2026-05-30).
      - name: Install Playwright browser (chromium)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 8
          max_attempts: 3
          command: npx playwright install chromium

      - name: Build plugin assets
        run: npm run build

      - name: Install dependencies
        run: |
          # Install Composer dependencies that might be needed for the plugin
          composer install --no-dev --no-interaction || echo "Composer install failed or not needed"

      - name: Install WordPress and start the server
        run: |
          npm run wp-env -- start --config .wp-env.test.json

          # Wait for WordPress admin to be accessible.
          npx wait-on http://localhost:8889/wp-admin -t 60000

          # Verify plugin is active.
          echo "Verifying GatherPress plugin is active..."
          npm run wp-env -- run --config .wp-env.test.json cli wp plugin list --status=active | grep gatherpress

          # Verify post types are registered via REST API.
          echo "Verifying GatherPress post types via REST API..."
          for i in 1 2 3 4 5; do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:8889/?rest_route=/wp/v2/types/gatherpress_event")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✓ GatherPress event post type registered (HTTP 200)"
              break
            fi
            echo "⏳ Waiting for post types... (attempt $i/5, HTTP status: $HTTP_STATUS)"
            sleep 2
          done

          # Final verification - fail if post type still not found.
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:8889/?rest_route=/wp/v2/types/gatherpress_event")
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ ERROR: GatherPress post types not accessible via REST API (HTTP $HTTP_STATUS)"
            npm run wp-env -- run --config .wp-env.test.json cli wp post-type list
            exit 1
          fi

          echo "✓ WordPress environment ready for E2E tests"

      - name: Run Playwright Tests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WP_BASE_URL: 'http://localhost:8889'
          PLAYWRIGHT_DEBUG: '1'
        run: npm run test:e2e

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Stop WordPress
        if: always()
        run: npm run wp-env -- stop --config .wp-env.test.json
