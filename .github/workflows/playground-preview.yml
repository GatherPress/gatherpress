# For now (!) the name here is important and should not be changed!
#
# The plugin-proxy.php does a check against exact this workflow name.
name: Playground Preview

# Why pull_request (not pull_request_target)?
#
# This workflow checks out and builds PR code (npm ci, npm run build) which is
# fundamentally untrusted. Running that on pull_request_target gives the PR's
# build scripts access to the base repo's GITHUB_TOKEN — a supply-chain attack
# surface (CodeQL flagged this as actions/untrusted-checkout/critical).
#
# The companion workflow `Playground Preview Comment` consumes this run's
# artifact via workflow_run, runs in the privileged base-repo context with
# `pull-requests: write`, and posts the preview-links PR comment — without ever
# executing PR code.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
    - 'build/**'
    - 'includes/**'
    - 'src/**'
    - '*.php'
    # Do start the workflow when the preview system itself changes so those
    # changes can produce a PR artifact and preview comment in forks.
    - '.github/scripts/playground-preview/**'
    - '.github/workflows/playground-preview*.yml'
    - 'docs/contributor/playground-pr-preview/**'
    - '.github/PULL_REQUEST_TEMPLATE.md'

# Cancels all previous workflow runs for pull requests that have not completed.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:

  zip:
    name: Build GatherPress plugin & upload as zipped artifact
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: latest
          coverage: none
          tools: wp-cli

      - name: Install dist-archive-command
        run: |
          # shivammathur/setup-php stores a GitHub OAuth token in Composer's
          # global auth config; wp-cli's bundled Composer rejects its format
          # ("invalid characters"), breaking this install. dist-archive-command
          # is public, so drop the token and install unauthenticated.
          composer config --global --unset github-oauth.github.com 2>/dev/null || true
          rm -f "$HOME/.config/composer/auth.json" "$HOME/.composer/auth.json" "$HOME/.wp-cli/packages/auth.json" 2>/dev/null || true
          wp package install wp-cli/dist-archive-command:^2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          # The built-in setup-node cache (keyed by package-lock.json hash) is
          # safe for untrusted PR code; the prior manual actions/cache restore
          # of ./node_modules was flagged as poisonable and is intentionally
          # removed.
          cache: 'npm'

      - name: NPM install
        run: npm ci

      - name: Build plugin
        # - [Incorrect version number used when creating zip archive · Issue #92 · wp-cli/dist-archive-command](https://github.com/wp-cli/dist-archive-command/issues/92)
        run: |
          npm run build
          wp dist-archive . ./${{ github.event.repository.name }}.zip

      - name: Save PR number for downstream comment workflow
        run: echo "${{ github.event.pull_request.number }}" > pr-number.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-pr
          path: |
            ./${{ github.event.repository.name }}.zip
            pr-number.txt
