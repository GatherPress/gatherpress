name: Deploy to WordPress.org Repository

on:
  release:
    types: [published]
    
jobs:
  deploy_to_wp_repository:
    name: Deploy to WP.org
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: 7.4
        tools: composer
        coverage: none
    - name: Install vendored libraries
      # Composer's `installer-paths` stanza lands `woocommerce/action-scheduler`
      # under `includes/libraries/action-scheduler/`, where the plugin's
      # bootstrap loads it from. `--no-dev` keeps test tooling out of the
      # `vendor/` tree for production builds (the zip excludes `vendor/`
      # anyway, but this keeps the install fast and the footprint tight).
      run: composer install --no-dev --optimize-autoloader --prefer-dist --no-interaction
    - name: Build
      run: |
        npm install
        npm run build
    - name: WordPress.org Plugin Deploy
      id: deploy
      uses: 10up/action-wordpress-plugin-deploy@stable
      with:
        generate-zip: true
      env:
        SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
        SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
    - name: Upload release asset
      uses: softprops/action-gh-release@v1
      with:
        files: ${{ github.workspace }}/${{ github.event.repository.name }}.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
