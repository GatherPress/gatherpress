# Thin caller for the reusable screenshot-generation workflow: regenerates
# the documentation images (docs/user/user-doc-media) from the Playwright
# spec at .github/scripts/docs-screenshots/ — English only, since the docs
# are written in English.

name: Documentation screenshot generation

on:
  workflow_dispatch:
    inputs:
      updateAllSnapshots:
        description: 'Replace all existing images? (By default only images with noticeable changes will be updated.)'
        required: false
        type: 'boolean'
        default: 'false' # Needs to be a string, see https://graphite.dev/guides/github-actions-inputs#handling-boolean-inputs

# Cancels all previous workflow runs.
concurrency:
  # The concurrency group contains the workflow name and the commit hash.
  group: ${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: true

jobs:
  screenshots:
    permissions:
      pull-requests: write
      contents: write  # Grant write permissions for the contents scope to allow pushing changes
    uses: ./.github/workflows/screenshot-generation.yml
    with:
      locales: '["en_US"]'
      npm-script: screenshots:docs
      output-path: docs/user/user-doc-media
      branch-prefix: docs-screenshots
      pr-title-template: 'Update documentation screenshots'
      update-all: ${{ github.event.inputs.updateAllSnapshots == 'true' }}
      # Docs must show the code under development, not the latest release:
      # the docs blueprint skips the wordpress.org installPlugin step and the
      # working tree is built and mounted as the plugin instead.
      blueprint: .github/scripts/docs-screenshots/blueprint.json
      mount-plugin: true
